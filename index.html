<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Era Selector — AI 201</title>

    <!-- Google Fonts: GFS Didot + Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body tabindex="-1">

    <!-- INTRO OVERLAY — persistent black backdrop, never fades until button click -->
    <div id="intro-overlay" class="intro-overlay" aria-hidden="true">

      <!-- DÉFILÉ — content fades out after 2s; overlay stays opaque -->
      <div class="intro-content">
        <span class="intro-headline">DÉFILÉ</span>
      </div>

      <!-- Stage 1: Quote screen — shown after DÉFILÉ content fades -->
      <div id="intro-stage-1">
        <div class="intro-screen-inner">
          <p class="intro-quote-p">
            <span id="s1-quote-text"></span><span class="intro-cursor hidden" id="s1-q-cursor">|</span>
          </p>
          <p class="intro-attr-p">
            <span id="s1-attr-text"></span><span class="intro-cursor hidden" id="s1-a-cursor">|</span>
          </p>
        </div>
      </div>

      <!-- Skip intro button — always visible while overlay is shown -->
      <button id="skip-intro">skip intro »</button>

      <!-- Stage 2: Archive + button screen — shown after Stage 1 fades -->
      <div id="intro-stage-2">
        <div class="intro-screen-inner">
          <p class="intro-body-p">
            <span id="s2-body-text"></span><span class="intro-cursor hidden" id="s2-b-cursor">|</span>
          </p>
          <p class="intro-cta-p">
            <span id="s2-cta-text"></span><span class="intro-cursor hidden" id="s2-c-cursor">|</span>
          </p>
          <button id="intro-button">ENTER THE ARCHIVE</button>
        </div>
      </div>

    </div><!-- /intro-overlay -->

    <!-- MAIN APP — Character Selector -->
    <main id="app" class="app-container">

      <!-- Left Navigation Arrow -->
      <button class="arrow arrow--prev" id="btn-prev" aria-label="Previous character">
        <span class="arrow-icon">&#8592;</span>
      </button>

      <!-- CAROUSEL — JS toggles .active; first card active by default -->
      <div class="carousel" id="carousel">

        <!-- CHARACTER 1: 1960s — Twiggy (André Courrèges) -->
        <article
          class="character-card character-card--1960s active"
          data-era="1960s"
          data-index="0"
          aria-label="1960s — Twiggy"
        >
          <!-- Background environment image — src set by JS -->
          <div class="era-background" aria-hidden="true"></div>

          <!-- Character image — src set by JS -->
          <img
            class="character-image-placeholder"
            src="./src/assets/images/character-60s-FINAL.png"
            alt="Twiggy, 1960s, André Courrèges"
          >

          <div class="character-text character-text--top-left">
            <h1 class="character-name">Twiggy</h1>
            <p class="character-year">1960s</p>
          </div>

          <div class="character-text character-text--bottom-right">
            <p class="character-brand">André Courrèges</p>
          </div>
        </article>

        <!-- CHARACTER 2: 1970s — Lauren Hutton (Yves Saint Laurent) -->
        <article
          class="character-card character-card--1970s"
          data-era="1970s"
          data-index="1"
          aria-label="1970s — Lauren Hutton"
        >
          <div class="era-background" aria-hidden="true"></div>

          <img
            class="character-image-placeholder"
            src="./src/assets/images/character-70s-FINAL.png"
            alt="Lauren Hutton, 1970s, Yves Saint Laurent"
          >

          <div class="character-text character-text--top-left">
            <h1 class="character-name">Lauren Hutton</h1>
            <p class="character-year">1970s</p>
          </div>

          <div class="character-text character-text--bottom-right">
            <p class="character-brand">Yves Saint Laurent</p>
          </div>
        </article>

        <!-- CHARACTER 3: 1980s — Christie Brinkley (Versace) -->
        <article
          class="character-card character-card--1980s"
          data-era="1980s"
          data-index="2"
          aria-label="1980s — Christie Brinkley"
        >
          <div class="era-background" aria-hidden="true"></div>

          <img
            class="character-image-placeholder"
            src="./src/assets/images/character-80s-FINAL.png"
            alt="Christie Brinkley, 1980s, Versace"
          >

          <div class="character-text character-text--top-left">
            <h1 class="character-name">Christie Brinkley</h1>
            <p class="character-year">1980s</p>
          </div>

          <div class="character-text character-text--bottom-right">
            <p class="character-brand">Versace</p>
          </div>
        </article>

        <!-- CHARACTER 4: 1990s — Kate Moss (Calvin Klein / Helmut Lang) -->
        <article
          class="character-card character-card--1990s"
          data-era="1990s"
          data-index="3"
          aria-label="1990s — Kate Moss"
        >
          <div class="era-background" aria-hidden="true"></div>

          <img
            class="character-image-placeholder"
            src="./src/assets/images/character-90s-FINAL.png"
            alt="Kate Moss, 1990s, Calvin Klein / Helmut Lang"
          >

          <div class="character-text character-text--top-left">
            <h1 class="character-name">Kate Moss</h1>
            <p class="character-year">1990s</p>
          </div>

          <div class="character-text character-text--bottom-right">
            <p class="character-brand">Calvin Klein / Helmut Lang</p>
          </div>
        </article>

        <!-- CHARACTER 5: 2000s — Gisele Bündchen (Dior by Galliano) -->
        <article
          class="character-card character-card--2000s"
          data-era="2000s"
          data-index="4"
          aria-label="2000s — Gisele Bündchen"
        >
          <div class="era-background" aria-hidden="true"></div>

          <img
            class="character-image-placeholder"
            src="./src/assets/images/character-00s-FINAL.png"
            alt="Gisele Bündchen, 2000s, Dior by Galliano"
          >

          <div class="character-text character-text--top-left">
            <h1 class="character-name">Gisele Bündchen</h1>
            <p class="character-year">2000s</p>
          </div>

          <div class="character-text character-text--bottom-right">
            <p class="character-brand">Dior by Galliano</p>
          </div>
        </article>

      </div><!-- /carousel -->

      <!-- Right Navigation Arrow -->
      <button class="arrow arrow--next" id="btn-next" aria-label="Next character">
        <span class="arrow-icon">&#8594;</span>
      </button>

      <!-- Carousel Position Indicators -->
      <div class="carousel-indicators" id="carousel-indicators" aria-hidden="true">
        <span class="indicator active" data-index="0"></span>
        <span class="indicator" data-index="1"></span>
        <span class="indicator" data-index="2"></span>
        <span class="indicator" data-index="3"></span>
        <span class="indicator" data-index="4"></span>
      </div>

    </main>

    <!-- Flash overlay — fullscreen image sequence on character click -->
    <div id="flash-overlay">
      <img id="flash-img" src="" alt="">
    </div>

    <!-- Detail overlay — character detail screen after flash -->
    <div id="detail-overlay">
      <button id="detail-back">&#8592; BACK</button>
      <button id="detail-mute">&#9834; mute</button>
      <div id="detail-moodboard">
        <img id="detail-moodboard-img" src="" alt="">
        <div id="detail-moodboard-dim"></div>
      </div>
      <!-- Gradient veil behind right-side text -->
      <div id="detail-right-gradient"></div>
      <div id="detail-left">
        <h2 id="detail-name"></h2>
        <p id="detail-era-label"></p>
      </div>
      <div id="detail-right">
        <p id="detail-context"></p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
